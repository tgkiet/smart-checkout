services:
  ssc-mongo:
    image: mongo:latest
    container_name: ssc-mongo
    ports:
      - "27917:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=rootpass
    volumes:
      - ../../data/mongo-volumes:/data/db
    networks:
      - smart-checkout-networks

  ssc-mongo-express:
    image: mongo-express:latest
    container_name: ssc-mongo-express
    ports:
      - "8281:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=rootpass
      - ME_CONFIG_MONGODB_SERVER=ssc-mongo
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=adminpass
    depends_on:
      - ssc-mongo
    networks:
      - smart-checkout-networks

networks:
  smart-checkout-networks:
    external: true
