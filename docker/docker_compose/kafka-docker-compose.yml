services:
  ssc-kafka:
    image: apache/kafka:latest
    container_name: ssc-kafka
    ports:
      - "9192:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@ssc-kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_NUM_PARTITIONS=3
    volumes:
      - ../../data/kafka-volumes:/var/lib/kafka/data
    networks:
      - smart-checkout-networks

  ssc-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ssc-kafka-ui
    ports:
      - "8180:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=ssc-kafka:9092
      - AUTH_TYPE=LOGIN_FORM
      - SPRING_SECURITY_USER_NAME=kafkaui
      - SPRING_SECURITY_USER_PASSWORD=adminpass
    depends_on:
      - ssc-kafka
    networks:
      - smart-checkout-networks

networks:
  smart-checkout-networks:
    external: true  